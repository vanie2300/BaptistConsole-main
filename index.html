<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Baptist Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=5">
  <link rel="stylesheet" href="shell.css?v=5">
  <script>
    (() => {
      if (localStorage.getItem('globalTheme') === 'light') {
        document.documentElement.classList.add('theme-light');
      }
    })();
  </script>
</head>
<body>
  <!-- ── Header ── -->
  <header class="shell-header">
    <div class="header-left">
      <div class="brand-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Baptist Console</span>
        <span class="brand-sub">Church Presentation Suite</span>
      </div>
    </div>

    <nav class="tab-bar" id="tabBar" role="tablist">
      <button class="tab active" data-tab="bible" role="tab" aria-selected="true" aria-controls="bible-frame">
        <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>Bible</span>
      </button>
      <button class="tab" data-tab="hymns" role="tab" aria-selected="false" aria-controls="hymn-frame">
        <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <span>Hymns</span>
      </button>
      <div class="tab-indicator" id="tabIndicator"></div>
    </nav>

    <div class="header-right">
      <button class="header-btn settings-header-btn" id="settingsBtn" title="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <div class="header-window-controls">
        <button class="header-btn win-btn" id="minimizeBtn" title="Minimize" aria-label="Minimize">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="3" y1="8" x2="13" y2="8"/></svg>
        </button>
        <button class="header-btn win-btn" id="maximizeBtn" title="Maximize" aria-label="Maximize">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2.5" y="2.5" width="11" height="11"/></svg>
        </button>
        <button class="header-btn win-btn close-btn" id="closeBtn" title="Close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Workspace ── -->
  <main class="workspace" id="workspace">
    <iframe id="bible-frame" class="module-frame" src="bible/bible_presenter.html"></iframe>
    <iframe id="hymn-frame" class="module-frame" src="hymns/presenter.html" hidden></iframe>
  </main>

  <!-- ── Status Bar ── -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-dot"></span>
      <span id="activeModule">Bible</span>
    </div>
    <div class="status-right">
      <span class="status-version">v1.0.0-dev</span>
    </div>
  </footer>

  <!-- ── Settings Modal ── -->
  <div class="settings-overlay" id="settingsOverlay" hidden>
    <div class="settings-modal" role="dialog" aria-label="Settings" aria-modal="true">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-body">
        <nav class="settings-sidebar" id="settingsSidebar">
          <button class="settings-cat active" data-cat="appearance">Appearance</button>
          <button class="settings-cat" data-cat="presentation">Presentation</button>
          <button class="settings-cat" data-cat="bible">Bible</button>
          <button class="settings-cat" data-cat="hymns">Hymns</button>
          <button class="settings-cat" data-cat="advanced">Advanced</button>
        </nav>
        <div class="settings-content" id="settingsContent">
          <!-- Populated by settings.js -->
        </div>
      </div>
      <div class="settings-footer">
        <button class="settings-btn secondary" id="settingsReset">Reset</button>
        <div class="settings-footer-right">
          <button class="settings-btn secondary" id="settingsCancel">Cancel</button>
          <button class="settings-btn primary" id="settingsSave">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="theme.js?v=5"></script>
  <script src="shell.js?v=5"></script>
</body>
</html>
