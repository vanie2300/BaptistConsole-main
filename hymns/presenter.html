<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hymn Presenter</title>
  <link rel="stylesheet" href="../theme.css?v=5">
  <link rel="stylesheet" href="presenter.css?v=5">
  <script>
    (() => {
      const theme = localStorage.getItem('globalTheme');
      if (theme === 'light') {
        document.documentElement.classList.add('theme-light');
      }
    })();
  </script>
</head>
<body>
  <!-- UI GROUP: Window Bar -->
  <div class="window-bar" data-ui="hymn-window-bar">
    <div class="window-title">Hymn Console</div>
    <div class="window-controls" data-ui="hymn-window-controls">
      <button class="window-btn" data-window-action="minimize" aria-label="Minimize">—</button>
      <button class="window-btn" data-window-action="maximize" aria-label="Maximize">□</button>
      <button class="window-btn close" data-window-action="close" aria-label="Close">×</button>
    </div>
  </div>
  <div class="app-shell" data-ui="hymn-layout-shell">
    <!-- UI GROUP: Library Panel -->
    <aside class="panel panel-left" data-ui="hymn-library-panel">
      <header class="panel-header library-header" data-ui="hymn-library-header">
        <div class="library-top" data-ui="hymn-library-header-top">
          <a class="back-link" href="../index.html">&#8592; Home</a>
          <div class="header-actions" data-ui="hymn-library-header-actions">
            <button class="link-action primary" id="addHymnBtn" data-ui="hymn-add-button">+ Add Hymn</button>
            <button class="link-action danger" id="deleteHymnBtn" data-ui="hymn-delete-button" disabled>Delete Hymn</button>
          </div>
        </div>
        <div class="library-title" data-ui="hymn-library-title">
          <h1 class="app-title">Hymn Console</h1>
          <p class="app-subtitle">Library</p>
        </div>
      </header>

      <div class="control-group" data-ui="hymn-search-input">
        <label for="searchBox" class="control-label">Search</label>
        <input type="text" class="search-box" id="searchBox" placeholder="Search hymns..." />
      </div>

      <section class="hymn-list" id="hymnList" data-ui="hymn-list"></section>
      <div class="status" id="statusMessage" data-ui="hymn-status"></div>
    </aside>

    <!-- UI GROUP: Preview Panel -->
    <main class="panel panel-right" data-ui="hymn-preview-panel">
      <header class="panel-header" data-ui="hymn-preview-header">
        <div>
          <p class="app-subtitle">Preview</p>
          <h2 class="app-title">Hymn Presenter</h2>
          <p class="muted">Select a hymn, navigate slides, and present.</p>
        </div>
          <div class="presenter-controls" data-ui="hymn-present-controls">
            <div class="presenter-display" id="presenterDisplayWrap" data-ui="hymn-presenter-display-select">
              <div class="presenter-pill" data-ui="hymn-presenter-display-pill">
                <span class="presenter-label">Presenter</span>
                <select id="presenterDisplayPicker" class="presenter-select">
                  <option value="">Default Display</option>
                </select>
              </div>
            </div>
            <button class="present-button" id="presentBtn" data-ui="hymn-present-button" disabled>Present</button>
            <div class="present-status" id="presentStatus">Presenter: Off</div>
          </div>
      </header>

      <section class="preview-grid" data-ui="hymn-preview-grid">
        <div class="slide-frame" id="currentSlide" data-ui="hymn-preview-current"><em>Select a hymn...</em></div>
        <div class="right-stack" data-ui="hymn-preview-side">
          <div class="slide-frame small" id="nextSlide" data-ui="hymn-preview-next"></div>
          <div class="present-controls" data-ui="hymn-nav-buttons">
            <button class="nav-button" id="prevBtn" disabled>&#8592; Previous</button>
            <button class="nav-button" id="nextBtn" disabled>Next &#8594;</button>
          </div>
        </div>
      </section>
      <section class="thumbnails" id="thumbnails" data-ui="hymn-preview-thumbnails"></section>
    </main>
  </div>
  <!-- UI GROUP: Add Hymn Modal -->
  <div class="modal-overlay" id="addModal" data-ui="hymn-modal-overlay" hidden>
    <div class="modal" data-ui="hymn-modal">
      <div class="modal-header" data-ui="hymn-modal-header">
        <h3>Add Hymn</h3>
        <button class="close-btn" type="button" id="closeModalBtn">×</button>
      </div>
      <form id="addHymnForm" class="modal-body">
        <label class="control-label" for="modalTitle">Title</label>
        <input id="modalTitle" type="text" required />

        <label class="control-label" for="modalVerses">Verses</label>
        <textarea id="modalVerses" rows="6" placeholder="Separate verses with a blank line. Lines inside a verse on new lines."></textarea>

        <label class="control-label" for="modalChorus">Chorus (optional)</label>
        <textarea id="modalChorus" rows="4" placeholder="One line per row."></textarea>

        <div class="modal-actions" data-ui="hymn-modal-actions">
          <button type="button" class="nav-button ghost" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="present-button">Save Hymn</button>
        </div>
      </form>
    </div>
  </div>
  <script src="../theme.js?v=5"></script>
  <script src="presenter.js?v=5"></script>
  <script>
    (() => {
      if (window.self !== window.top) document.body.classList.add('in-iframe');
      const controls = window.windowControls;
      document.querySelectorAll('[data-window-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (!controls) return;
          const action = btn.getAttribute('data-window-action');
          if (action === 'minimize') controls.minimize();
          if (action === 'maximize') controls.maximize();
          if (action === 'close') controls.close();
        });
      });
    })();
  </script>
</body>
</html>
