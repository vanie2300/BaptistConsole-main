<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presentation</title>
<meta name="viewport" content="width=1024, initial-scale=1.0">
<link rel="stylesheet" href="../theme.css">
<script>
  (() => {
    const theme = localStorage.getItem('globalTheme');
    if (theme === 'dark') {
      document.documentElement.classList.add('theme-dark');
    } else if (theme === 'light') {
      document.documentElement.classList.add('theme-light');
    }
    const bg = localStorage.getItem('settings_presenterBg');
    const text = localStorage.getItem('settings_presenterText');
    const weight = localStorage.getItem('settings_presenterWeight');
    const font = localStorage.getItem('settings_presenterFont');
    if (bg) document.documentElement.style.setProperty('--present-bg', bg);
    if (text) document.documentElement.style.setProperty('--present-text', text);
    if (font) document.documentElement.style.setProperty('--present-font', font);
    var bgImage = localStorage.getItem('settings_presenterBgImage');
    var bgOpacity = localStorage.getItem('settings_presenterBgOpacity');
    if (bgImage) {
      var layer = document.getElementById('bgImageLayer');
      if (layer) {
        layer.style.backgroundImage = 'url("file:///' + bgImage.replace(/\\/g, '/').replace(/"/g, '\\"') + '")';
        layer.style.opacity = String((Number(bgOpacity) || 30) / 100);
        layer.style.display = 'block';
      }
    }
  })();
</script>
<style>
body {
    margin: 0;
    background: var(--present-bg, var(--bg));
    color: var(--present-text, var(--text));
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    font-family: var(--present-font, 'Segoe UI', 'Arial', sans-serif);
}
#bgImageLayer {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: -1;
    pointer-events: none;
    display: none;
}
#slideContent {
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;   /* Snap content to top */
    align-items: stretch;          /* Make children full width */
    padding: 2vw 3vw;
    text-align: left;
    overflow-y: hidden;
    font-family: var(--present-font, 'Segoe UI', 'Arial', sans-serif);
    border: none;
    gap: 2vw;
    font-weight: bold;
}
.slide-label {
    font-weight: bold;
    font-size: 2vw;
    margin: 0;
    padding: 0;
    color: var(--primary);
    letter-spacing: 0.05em;
    text-shadow: 0 2px 8px #000a;
}
.slide-title {
    font-weight: bold;
    font-size: 7vw;
    width: 100%;
 
    color: var(--text);
    text-shadow: 0 2px 8px #000a;
   
    display: flex;
    justify-content: center;
    align-items: center;
}
.slide-lyrics {
    font-size: 1vw;
    line-height: 1.18;
    color: var(--text);
    text-shadow: 0 2px 8px #000a;
    width: 100%;
    word-break: break-word;
}
#slideContent.centered {
    justify-content: center !important;
    align-items: center !important;
}
@media (max-width: 700px) {
    #slideContent { padding: 4vw 2vw; }
    .slide-label { font-size: 6vw; }
    .slide-title { font-size: 10vw; }
    .slide-lyrics { font-size: 8vw; }
}
</style>
</head>
<body data-ui="hymn-presentation-body">
<!-- UI GROUP: Presentation Stage -->
<div id="bgImageLayer"></div>
<div id="slideContent" data-ui="hymn-presentation-stage"><em>Waiting for slides...</em></div>
<script src="../theme.js"></script>
<script>
let slides = [];
let currentIndex = 0;

function requestFullscreenSafe() {
    try {
        if (document.fullscreenElement) return;
        const el = document.documentElement;
        if (el.requestFullscreen) {
            el.requestFullscreen().catch(() => {});
        }
    } catch (err) {
        // Ignore fullscreen errors (browser policy, etc).
    }
}

function maximizeWindow() {
    const isElectron = navigator.userAgent.toLowerCase().includes('electron');
    if (isElectron) return;
    try {
        window.moveTo(0, 0);
        window.resizeTo(screen.availWidth, screen.availHeight);
    } catch (err) {
        // Ignore resize errors (browser policy, etc).
    }
}

function escapeHtml(text) {
    return String(text).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[m]);
}

function renderSlide() {
    const slide = slides[currentIndex] || { lines: ['End of hymn'] };
    const container = document.getElementById('slideContent');
    const align = window._hymnAlign || localStorage.getItem('settings_hymnAlign') || 'left';
    const layout = window._hymnLayout || localStorage.getItem('settings_hymnLayout') || 'full';
    const showNumbers = window._hymnShowNumbers !== undefined ? window._hymnShowNumbers : (localStorage.getItem('settings_hymnShowNumbers') !== 'false');
    const titleSize = window._hymnTitleSize || Number(localStorage.getItem('settings_hymnTitleSize')) || 7;

    container.style.textAlign = align;
    container.style.maxWidth = layout === 'compact' ? '70vw' : '100%';
    container.style.padding = layout === 'compact' ? '4vw 10vw' : '2vw 3vw';

    if (slide.type === 'title') {
        container.classList.add('centered');
        container.innerHTML = `
            <div class="slide-title" id="autoFitTarget" style="font-size:${titleSize}vw">${escapeHtml(slide.title)}</div>
        `;
        autoFitText(document.getElementById('autoFitTarget'), titleSize, 2);
    } else {
        container.classList.remove('centered');
        const label = slide.type === 'chorus' ? 'Chorus' : 'Verse ' + slide.number;
        const content = (slide.lines || []).map(escapeHtml).join('<br>');
        if (showNumbers) {
            container.innerHTML = `
                <div class="slide-label" id="autoFitLabel">${label}</div>
                <div class="slide-lyrics" id="autoFitLyrics">${content}</div>
            `;
            autoFitText(document.getElementById('autoFitLyrics'), 6.5, 4);
            autoFitText(document.getElementById('autoFitLabel'), 3, 1.2);
        } else {
            container.innerHTML = `
                <div class="slide-lyrics" id="autoFitLyrics">${content}</div>
            `;
            autoFitText(document.getElementById('autoFitLyrics'), 7, 4);
        }
    }
    autoFitText(container);
}

function applyPresenterSettings() {
    const root = document.documentElement;
    const bg = localStorage.getItem('settings_presenterBg');
    const text = localStorage.getItem('settings_presenterText');
    const weight = localStorage.getItem('settings_presenterWeight');
    const font = localStorage.getItem('settings_presenterFont');
    const bgImage = localStorage.getItem('settings_presenterBgImage');
    const bgOpacity = localStorage.getItem('settings_presenterBgOpacity');

    if (bg) root.style.setProperty('--present-bg', bg);
    if (text) root.style.setProperty('--present-text', text);
    if (font) root.style.setProperty('--present-font', font);

    var bgLayer = document.getElementById('bgImageLayer');
    if (bgLayer) {
        if (bgImage) {
            bgLayer.style.backgroundImage = 'url("file:///' + bgImage.replace(/\\/g, '/').replace(/"/g, '\\"') + '")';
            bgLayer.style.opacity = String((Number(bgOpacity) || 30) / 100);
            bgLayer.style.display = 'block';
        } else {
            bgLayer.style.display = 'none';
        }
    }

    // Apply weight to lyric/label elements
    document.querySelectorAll('.slide-lyrics, .slide-label').forEach((el) => {
        if (weight) el.style.fontWeight = weight;
    });
    renderSlide();
}

function applyThemeFromStorage() {
    const theme = localStorage.getItem('globalTheme');
    document.documentElement.classList.toggle('theme-dark', theme === 'dark');
    document.documentElement.classList.toggle('theme-light', theme === 'light');
}

function autoFitText(container, maxFont = 8, minFont = 4) {
    // Try to fit the text by shrinking font-size (in vw) until it fits or hits minFont
    let fontSize = maxFont;
    container.style.fontSize = fontSize + 'vw';
    // Use a timeout to ensure rendering is complete
    setTimeout(() => {
        while ((container.scrollHeight > container.parentElement.clientHeight || container.scrollWidth > container.parentElement.clientWidth) && fontSize > minFont) {
            fontSize -= 0.2;
            container.style.fontSize = fontSize + 'vw';
        }
    }, 0);
}

// Listen for messages from the main window
window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'init') {
        slides = e.data.slides;
        currentIndex = e.data.currentIndex;
        renderSlide();
    } else if (e.data && e.data.type === 'navigate') {
        currentIndex = e.data.currentIndex;
        renderSlide();
    } else if (e.data && e.data.type === 'settingsUpdate') {
        const root = document.documentElement;
        if (e.data.bg) root.style.setProperty('--present-bg', e.data.bg);
        if (e.data.text) root.style.setProperty('--present-text', e.data.text);
        if (e.data.font) root.style.setProperty('--present-font', e.data.font);
        var bgLayer = document.getElementById('bgImageLayer');
        if (bgLayer) {
            if (e.data.bgImage) {
                bgLayer.style.backgroundImage = 'url("file:///' + e.data.bgImage.replace(/\\/g, '/').replace(/"/g, '\\"') + '")';
                bgLayer.style.opacity = String((e.data.bgOpacity || 30) / 100);
                bgLayer.style.display = 'block';
            } else {
                bgLayer.style.display = 'none';
            }
        }
        renderSlide();
    } else if (e.data && e.data.type === 'hymnSettingsUpdate') {
        if (e.data.align) window._hymnAlign = e.data.align;
        if (e.data.layout) window._hymnLayout = e.data.layout;
        if (typeof e.data.showNumbers === 'boolean') window._hymnShowNumbers = e.data.showNumbers;
        if (typeof e.data.titleSize === 'number') window._hymnTitleSize = e.data.titleSize;
        renderSlide();
    }
});

window.addEventListener('load', function() {
    applyThemeFromStorage();
    applyPresenterSettings();
    maximizeWindow();
    requestFullscreenSafe();
});
window.addEventListener('click', requestFullscreenSafe);

// Keyboard navigation (optional)
window.addEventListener('keydown', function(e) {
    if (!slides.length) return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') {
        if (currentIndex < slides.length - 1) {
            currentIndex++;
            renderSlide();
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({ type: 'navigateFromPopup', currentIndex }, '*');
            }
        }
    } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        if (currentIndex > 0) {
            currentIndex--;
            renderSlide();
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({ type: 'navigateFromPopup', currentIndex }, '*');
            }
        }
    } else if (e.key === 'Escape') {
        window.close();
    }
});
</script>
</body>
</html>
